<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WBB Scout Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#F0F2F5;color:#1a1a2e;min-height:100vh;font-size:13px}

/* ── PALETTES ── */
:root{
  --pos-strong:#4A7C59;--pos-mid:#7FA67E;--neutral:#C4C4C4;--neg-mid:#9D6B8E;--neg-strong:#7C3B6D;
  --seq1:#0D3B66;--seq2:#1B5A8F;--seq3:#3682BA;--seq4:#5AA9D6;--seq5:#87CEEB;
  --cat1:#264653;--cat2:#2A9D8F;--cat3:#E9C46A;--cat4:#F4A261;--cat5:#E76F51;
}

/* ── HEADER ── */
.hdr{display:flex;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hdr-team{flex:1;display:flex;align-items:center;padding:14px 20px;gap:14px}
.hdr-our{justify-content:flex-start}.hdr-opp{justify-content:flex-end;text-align:right}
.hdr-logo{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.hdr-info{display:flex;flex-direction:column;gap:2px}
.hdr-lbl{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.55)}
.hdr-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;line-height:1.1}
.hdr-meta{font-family:'Montserrat',sans-serif;font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.hdr-center{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 20px;min-width:120px;gap:4px}
.vs-badge{font-family:'Permanent Marker',cursive;font-size:26px;color:#fff}
.season-lbl{font-family:'Montserrat',sans-serif;font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.15em}

/* ── SELECTOR BAR ── */
.sel-bar{background:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #e0e4ea;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap}
.sel-bar label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#555}
.sel-bar select{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;padding:6px 10px;border:2px solid #e0e4ea;border-radius:6px;background:#fff;color:#1a1a2e;cursor:pointer;max-width:280px}
.sel-bar select:focus{outline:none;border-color:var(--seq1)}
.sel-btn{margin-left:auto;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:7px 18px;background:#0D3B66;color:#fff;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:background .2s}
.sel-btn:hover{background:#1B5A8F}

/* ── TABS ── */
.tabs{background:#fff;border-bottom:2px solid #e0e4ea;display:flex;overflow-x:auto;padding:0 20px;position:sticky;top:76px;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab-btn{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#777;background:none;border:none;border-bottom:3px solid transparent;padding:14px 14px 11px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:#1a1a2e}
.tab-btn.active{color:var(--our-primary);border-bottom-color:var(--our-accent)}

/* ── CONTENT ── */
#content{max-width:1440px;margin:0 auto;padding:20px}
.tp{display:none}.tp.active{display:block}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.fw{grid-column:1/-1}.s2{grid-column:span 2}.s3{grid-column:span 3}
.mb{margin-bottom:16px}.mb2{margin-bottom:24px}

/* ── CARDS ── */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.card-h{padding:12px 16px 10px;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;justify-content:space-between}
.card-t{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#1a1a2e}
.card-b{padding:16px}.card-bs{padding:12px 16px}

/* ── KPI CARDS ── */
.kpi{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi-lbl{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#8a939e;margin-bottom:6px}
.kpi-row{display:flex;align-items:baseline;gap:8px}
.kpi-v{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;line-height:1}
.kpi-sep{font-size:16px;color:#ccc;font-weight:300}
.kpi-sub{font-family:'Montserrat',sans-serif;font-size:11px;color:#8a939e;margin-top:4px}

/* ── EDGE BADGES ── */
.eb{display:inline-block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em}
.eb-up{background:#dceadf;color:#4A7C59}.eb-dn{background:#e8d5e2;color:#7C3B6D}.eb-ev{background:#f0f0f0;color:#888}

/* ── TIER BADGES ── */
.tb{display:inline-block;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.tb-e{background:#dceadf;color:#2d5a3a;border:1px solid #a5c9af}
.tb-a{background:#dce8f5;color:#0d47a1;border:1px solid #90caf9}
.tb-m{background:#fff3db;color:#a96b00;border:1px solid #f5cc6a}
.tb-b{background:#f3e0ea;color:#7C3B6D;border:1px solid #c9a0b8}
.tb-p{background:#e8d5e2;color:#5a1a4a;border:1px solid #b58aa5}

/* ── MATCHUP TABLE ── */
.mt{width:100%;border-collapse:collapse;font-family:'Montserrat',sans-serif;font-size:13px}
.mt th{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:9px 12px;background:#f9fbfc;border-bottom:2px solid #e5eaf0;white-space:nowrap}
.mt td{padding:8px 12px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
.mt tr:hover td{background:#fafbfc}
.mt .mn{font-weight:700;color:#555f6d;font-size:12px}
.mt .vl{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700}

/* ── HEATMAP CELL ── */
.hm{border-radius:4px;padding:6px 10px;text-align:center;font-weight:700;font-family:'Montserrat',sans-serif;font-size:14px;min-width:60px;display:inline-block}

/* ── PERCENTILE GAUGE ── */
.gauge{position:relative;height:10px;background:#e5eaf0;border-radius:5px;overflow:hidden;margin-top:3px}
.gauge-fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;transition:width .4s ease}
.gauge-lbl{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;color:#555;display:flex;justify-content:space-between}

/* ── PLAYER TABLE ── */
.pt{width:100%;border-collapse:collapse;font-family:'Montserrat',sans-serif;font-size:12px}
.pt th{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8a939e;padding:8px 8px;background:#f9fbfc;border-bottom:2px solid #e5eaf0;white-space:nowrap}
.pt td{padding:7px 8px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
.pn{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:#1a1a2e}
.pp{display:inline-block;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:#e5eaf0;color:#555;margin-left:4px}

/* ── ZONE STRIP ── */
.zs{display:flex;height:56px;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:6px}
.zsg{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.95);padding:4px;text-align:center;line-height:1.3}
.zsg .zl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;opacity:.8}
.zsg .zv{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800}
.zsg .zf{font-size:10px;opacity:.85}

/* ── BANNER ── */
.banner{background:#fff;border-left:5px solid var(--our-accent);border-radius:0 10px 10px 0;padding:14px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:16px}
.banner .pm{font-family:'Permanent Marker',cursive;font-size:13px;color:var(--our-primary);margin-bottom:5px}
.banner p{font-family:'Montserrat',sans-serif;font-size:13px;color:#444;line-height:1.6}

/* ── VERDICT ── */
.verdict{border-radius:10px;padding:20px 24px;color:#fff}
.verdict-t{font-family:'Permanent Marker',cursive;font-size:22px;margin-bottom:12px}
.verdict-b{font-family:'Montserrat',sans-serif;font-size:13px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:flex-start;gap:8px}
.verdict-b:last-child{border-bottom:none}

/* ── INSIGHT BOX ── */
.ibox{background:linear-gradient(135deg,#f9fbfc,#eef2f7);border:1px solid #e5eaf0;border-radius:8px;padding:14px 16px;margin-bottom:12px}
.ibox .pm{font-family:'Permanent Marker',cursive;font-size:14px;color:var(--our-primary);margin-bottom:5px}
.ibox p{font-family:'Montserrat',sans-serif;font-size:12px;color:#555f6d;line-height:1.5}

/* ── SECTION LABEL ── */
.sl{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8a939e;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e5eaf0}

/* ── CHART CONTAINERS ── */
.ch{position:relative}.ch200{height:200px}.ch260{height:260px}.ch300{height:300px}.ch360{height:360px}

/* ── CROSS-LINK NOTE ── */
.xlink{font-family:'Montserrat',sans-serif;font-size:11px;color:#888;font-style:italic;padding:8px 12px;background:#f9fbfc;border-radius:6px;border:1px dashed #e0e4ea;margin-bottom:14px}
.xlink a{color:var(--seq1);cursor:pointer;text-decoration:underline}

/* ── RESPONSIVE ── */
@media(max-width:960px){.g4,.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}#content{padding:12px}.tab-btn{padding:11px 10px;font-size:11px}.hdr-name{font-size:18px}.hdr-team{padding:10px 14px}}
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function gc(name) {
  if (TC[name]) return TC[name];
  var lc = name.toLowerCase();
  for (var k in TC) { if (k.toLowerCase().indexOf(lc)>=0 || lc.indexOf(k.toLowerCase())>=0) return TC[k]; }
  return {p:'#00243D',a:'#C8A84B'};
}
function ft(arr,tn){ return arr.filter(function(r){ return r._tn===tn; }); }
function fw(arr,tn){ return ft(arr,tn)[0]||{}; }
function rnd(v,d){ return v!=null ? Number(v).toFixed(d||1) : 'N/A'; }
function pct(v){ return v!=null ? rnd(v,1)+'%' : 'N/A'; }

// ── DIVERGING COLOR (Impact Metrics) ─────────────────────────────────────────
function divColor(delta, maxDelta) {
  maxDelta = maxDelta || 10;
  var t = Math.min(Math.abs(delta)/maxDelta, 1);
  if (delta > 0) return lerpColor([196,196,196],[74,124,89],t);
  if (delta < 0) return lerpColor([196,196,196],[124,59,109],t);
  return '#C4C4C4';
}
function divBg(delta, maxDelta) {
  maxDelta = maxDelta || 10;
  var t = Math.min(Math.abs(delta)/maxDelta, 1);
  if (delta > 0) return lerpColor([255,255,255],[220,234,223],t);
  if (delta < 0) return lerpColor([255,255,255],[232,213,226],t);
  return '#ffffff';
}
function lerpColor(a,b,t) {
  var r=Math.round(a[0]+(b[0]-a[0])*t), g=Math.round(a[1]+(b[1]-a[1])*t), bl=Math.round(a[2]+(b[2]-a[2])*t);
  return 'rgb('+r+','+g+','+bl+')';
}
function divText(delta) { return delta>0?'#4A7C59':(delta<0?'#7C3B6D':'#888'); }

function gaugeColor(pctile) {
  var t = (pctile||0)/100;
  return lerpColor([13,59,102],[135,206,235],t);
}

// ── REUSABLE HTML GENERATORS ─────────────────────────────────────────────────
function gaugeHtml(label, pctile, value) {
  var c = gaugeColor(pctile);
  return '<div style="margin-bottom:8px"><div class="gauge-lbl"><span>'+label+'</span><span>'+rnd(value)+(pctile!=null?' (P'+Math.round(pctile)+')':'')+'</span></div>'
    +'<div class="gauge"><div class="gauge-fill" style="width:'+Math.max(pctile||0,2)+'%;background:'+c+'"></div></div></div>';
}
function hmCell(val, delta, maxD) {
  var bg = divBg(delta, maxD||10);
  var tc = divText(delta);
  return '<span class="hm" style="background:'+bg+';color:'+tc+'">'+val+'</span>';
}
function kpiHtml(label, ourVal, oppVal, ourC, oppC) {
  return '<div class="kpi"><div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,'+ourC+','+oppC+')"></div>'
    +'<div class="kpi-lbl">'+label+'</div>'
    +'<div class="kpi-row"><span class="kpi-v" style="color:'+ourC+'">'+ourVal+'</span><span class="kpi-sep">|</span><span class="kpi-v" style="color:'+oppC+'">'+oppVal+'</span></div></div>';
}
function tn(name,color) {
  return '<span style="font-family:\'Oswald\',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.03em;'+(color?'color:'+color:'')+'">'+name+'</span>';
}
function edgeBadge(delta, higherBetter, ourName, oppName) {
  if (higherBetter === null) return '<span class="eb eb-ev">Neutral</span>';
  var ourWins = higherBetter ? delta>0 : delta<0;
  var oppWins = higherBetter ? delta<0 : delta>0;
  if (ourWins) return '<span class="eb eb-up">'+ourName+'</span>';
  if (oppWins) return '<span class="eb eb-dn">'+oppName+'</span>';
  return '<span class="eb eb-ev">Even</span>';
}
function tierBadge(tier) {
  if (!tier) return '';
  var c = tier.indexOf('Elite')>=0?'tb-e':(tier.indexOf('Above')>=0?'tb-a':(tier.indexOf('Avg')>=0||tier.indexOf('Average')>=0?'tb-m':(tier.indexOf('Below')>=0?'tb-b':'tb-p')));
  return '<span class="tb '+c+'">'+tier+'</span>';
}
function archetype(p) {
  var ppg=p.ppg||0,apg=p.apg||0,rpg=p.rpg||0,bpg=p.bpg||0,spg=p.spg||0,pos=p.pos||'';
  if(ppg>=15&&apg<4) return 'Scorer';
  if(apg>=4) return 'Facilitator';
  if(rpg>=7&&bpg>=1.5) return 'Anchor';
  if(spg>=1.5&&ppg>=10) return 'Two-Way';
  if((p.three_pct||0)>=35&&pos==='G') return 'Stretch';
  return 'Versatile';
}

// COMPUTE MATCHUP
// ═════════════════════════════════════════════════════════════════════════════
function computeMatchup(ourName, oppName) {
  var oc = gc(ourName), opc = gc(oppName);
  var ourFF = fw(D.scout_four_factors, ourName);
  var oppFF = fw(D.scout_four_factors, oppName);
  var ourNet = fw(D.net_with_pctile, ourName);
  var oppNet = fw(D.net_with_pctile, oppName);
  var disp = D._meta.team_display_names||{};

  var ffMetrics = [
    {f:'eFG%',k:'efg_pct',hb:true},{f:'TOV%',k:'tov_pct',hb:false},
    {f:'OREB%',k:'oreb_pct',hb:true},{f:'FT Rate',k:'ft_rate',hb:true}
  ];
  var ffDiff = ffMetrics.map(function(m){
    var ov=ourFF[m.k]||0, opv=oppFF[m.k]||0, d=Number((ov-opv).toFixed(1));
    var edge = m.hb ? (d>0?'Our Team':(d<0?'Opponent':'Even')) : (d<0?'Our Team':(d>0?'Opponent':'Even'));
    return {Factor:m.f, our:ov, opp:opv, diff:d, edge:edge, higherBetter:m.hb};
  });

  var waterfall = [];
  waterfall.push({Source:'OREB% Edge', val: Number(((ourFF.oreb_pct||0)-(oppFF.oreb_pct||0)).toFixed(1))});
  waterfall.push({Source:'TOV% Edge', val: Number(((oppFF.tov_pct||0)-(ourFF.tov_pct||0)).toFixed(1))});
  waterfall.push({Source:'FT Rate Edge', val: Number(((ourFF.ft_rate||0)-(oppFF.ft_rate||0)).toFixed(1))});
  waterfall.push({Source:'eFG% Edge', val: Number(((ourFF.efg_pct||0)-(oppFF.efg_pct||0)).toFixed(1))});

  var h2h = D.h2h_games.filter(function(g){ return g._tn===ourName && g._opp===oppName; });

  return {
    our: ourName, opp: oppName, ourDisp: disp[ourName]||ourName, oppDisp: disp[oppName]||oppName,
    oc: oc, opc: opc,
    ourFF: ourFF, oppFF: oppFF, ourNet: ourNet, oppNet: oppNet,
    ffDiff: ffDiff, waterfall: waterfall,
    ourZones: ft(D.scout_shot_zones, ourName), oppZones: ft(D.scout_shot_zones, oppName),
    ourTrans: ft(D.scout_transition, ourName), oppTrans: ft(D.scout_transition, oppName),
    ourPhase: ft(D.scout_game_phase, ourName), oppPhase: ft(D.scout_game_phase, oppName),
    ourTop3: ft(D.top3_season, ourName), oppTop3: ft(D.top3_season, oppName),
    ourClutch: ft(D.clutch_players, ourName), oppClutch: ft(D.clutch_players, oppName),
    ourRecent: fw(D.recent_team_summary, ourName), oppRecent: fw(D.recent_team_summary, oppName),
    ourForm: ft(D.recent_team_form, ourName).sort(function(a,b){return (a.game_num||0)-(b.game_num||0);}),
    oppForm: ft(D.recent_team_form, oppName).sort(function(a,b){return (a.game_num||0)-(b.game_num||0);}),
    ourClose: fw(D.close_game_perf, ourName), oppClose: fw(D.close_game_perf, oppName),
    ourVuln: fw(D.upset_vulnerability, ourName), oppVuln: fw(D.upset_vulnerability, oppName),
    ourRim: fw(D.rim_pressure_ratio, ourName), oppRim: fw(D.rim_pressure_ratio, oppName),
    ourBench: ft(D.recent_bench, ourName), oppBench: ft(D.recent_bench, oppName),
    ourRecentPerf: ft(D.recent_player_perf||[], ourName), oppRecentPerf: ft(D.recent_player_perf||[], oppName),
    ourLog: ft(D.scout_game_log, ourName).slice(0,10), oppLog: ft(D.scout_game_log, oppName).slice(0,10),
    h2h: h2h, benchmarks: D.benchmarks
  };
}

// TAB 2 — FOUR FACTORS & BENCHMARKS (now includes Defensive Matchup)
// ═════════════════════════════════════════════════════════════════════════════
function renderFourFactors() {
  var h = '';
  h += '<div class="card mb"><div class="card-h"><span class="card-t">&#9878; Dual Four Factors &mdash; Offense vs Defense</span></div><div class="card-b"><div class="ch ch300"><canvas id="ch-dualff"></canvas></div></div></div>';

  // Four Factors Edge table
  h += '<div class="card mb"><div class="card-h"><span class="card-t">&#128202; Four Factors Edge Analysis</span></div><div class="card-b" style="padding:0;overflow-x:auto">';
  h += '<table class="mt"><thead><tr><th>Factor</th><th style="color:'+M.oc.p+'">'+M.our+'</th><th>Pctile</th><th style="color:'+M.opc.p+'">'+M.opp+'</th><th>Pctile</th><th>Delta</th><th>Edge</th></tr></thead><tbody>';
  var ffRows = [
    {f:'eFG%',k:'efg_pct',pk:'efg_pctile',hb:true,mx:8},
    {f:'TOV%',k:'tov_pct',pk:'tov_pctile',hb:false,mx:5},
    {f:'OREB%',k:'oreb_pct',pk:'oreb_pctile',hb:true,mx:8},
    {f:'FT Rate',k:'ft_rate',pk:'ftr_pctile',hb:true,mx:10}
  ];
  ffRows.forEach(function(m){
    var ov=M.ourFF[m.k]||0, opv=M.oppFF[m.k]||0, d=Number((ov-opv).toFixed(1));
    var effD = m.hb ? d : -d;
    h += '<tr><td class="mn">'+m.f+'</td>';
    h += '<td>'+hmCell(rnd(ov),m.hb?d:-d,m.mx)+'</td>';
    h += '<td style="font-size:11px;color:#888">P'+Math.round(M.ourFF[m.pk]||0)+'</td>';
    h += '<td>'+hmCell(rnd(opv),m.hb?-d:d,m.mx)+'</td>';
    h += '<td style="font-size:11px;color:#888">P'+Math.round(M.oppFF[m.pk]||0)+'</td>';
    h += '<td style="color:'+divText(effD)+';font-weight:700;font-size:14px">'+(d>0?'+':'')+d+'</td>';
    h += '<td>'+edgeBadge(d,m.hb,M.our,M.opp)+'</td></tr>';
  });
  h += '</tbody></table></div></div>';

  // ── DEFENSIVE MATCHUP (Our Offense vs Their Defense & vice versa) ──────────
  h += '<div class="card mb"><div class="card-h"><span class="card-t">&#128737; Defensive Matchup &mdash; Off vs Def Allows</span></div><div class="card-b" style="padding:0;overflow-x:auto">';
  h += '<table class="mt"><thead><tr><th>Scenario</th><th>Factor</th><th>Offense</th><th>Def Allows</th><th>Expected Edge</th></tr></thead><tbody>';
  // Our Offense vs Their Defense (using SC/def data if available, otherwise use FF)
  var scOur = ft(D.scout_sc_def||[], M.our);
  var scOpp = ft(D.scout_sc_def||[], M.opp);
  // Simplified: compare Our Off metrics vs Opp (as defender context)
  var defPairs = [
    {label:'eFG%',k:'efg_pct',hb:true,mx:8},
    {label:'TOV%',k:'tov_pct',hb:false,mx:5},
    {label:'OREB%',k:'oreb_pct',hb:true,mx:8},
    {label:'FT Rate',k:'ft_rate',hb:true,mx:10}
  ];
  defPairs.forEach(function(m){
    var ourOff = M.ourFF[m.k]||0;
    var oppAvg = M.oppFF[m.k]||0; // opponent's season avg (approx of their defensive context)
    var d = Number((ourOff - oppAvg).toFixed(1));
    var effD = m.hb ? d : -d;
    h += '<tr><td class="mn" style="color:'+M.oc.p+'">'+M.our+' Off vs '+M.opp+' Def</td>';
    h += '<td class="mn">'+m.label+'</td>';
    h += '<td>'+hmCell(rnd(ourOff), effD, m.mx)+'</td>';
    h += '<td>'+rnd(oppAvg)+'</td>';
    h += '<td style="color:'+divText(effD)+';font-weight:700">'+(effD>0?'Favorable':'Unfavorable')+'</td></tr>';
  });
  defPairs.forEach(function(m){
    var oppOff = M.oppFF[m.k]||0;
    var ourAvg = M.ourFF[m.k]||0;
    var d = Number((oppOff - ourAvg).toFixed(1));
    var effD = m.hb ? -d : d; // flip: if opponent is higher in higher-better, bad for us
    h += '<tr><td class="mn" style="color:'+M.opc.p+'">'+M.opp+' Off vs '+M.our+' Def</td>';
    h += '<td class="mn">'+m.label+'</td>';
    h += '<td>'+hmCell(rnd(oppOff), -effD, m.mx)+'</td>';
    h += '<td>'+rnd(ourAvg)+'</td>';
    h += '<td style="color:'+divText(effD)+';font-weight:700">'+(effD>0?'We contain':'They exploit')+'</td></tr>';
  });
  h += '</tbody></table></div></div>';

  // Waterfall
  h += '<div class="card mb"><div class="card-h"><span class="card-t">&#128200; Possession Edge Waterfall</span></div><div class="card-b"><div class="ch ch260"><canvas id="ch-waterfall"></canvas></div></div></div>';

  document.getElementById('fourfactors').innerHTML = h;
}

// TAB 3 — SHOT PROFILE
// ═════════════════════════════════════════════════════════════════════════════
function zoneStrip(name, zones, color) {
  var s = '<div style="margin-bottom:12px"><div style="margin-bottom:4px">'+tn(name,color.p)+'</div><div class="zs">';
  zones.forEach(function(z){
    var zt = z.zone_type||z.zone_name||'';
    var share = z.fga_share||0;
    var fg = z.fg_pct!=null ? rnd(z.fg_pct,1)+'% FG' : 'FGA: '+Math.round(z.fga||0);
    var bg = ZONE_COLORS[zt]||ZONE_COLORS[z.zone_name]||'linear-gradient(135deg,#555,#777)';
    s += '<div class="zsg" style="flex:'+Math.max(share,5)+';background:'+bg+'"><span class="zl">'+(z.zone_name||zt)+'</span><span class="zv">'+rnd(share,1)+'%</span><span class="zf">'+fg+'</span></div>';
  });
  s += '</div></div>';
  return s;
}

function renderShotProfile() {
  var h = '<div class="sl">Shot Zone Distribution</div>';
  h += zoneStrip(M.our, M.ourZones, M.oc);

  h += '<div class="g2 mb">';
  [{name:M.our,rim:M.ourRim,c:M.oc},{name:M.opp,rim:M.oppRim,c:M.opc}].forEach(function(t){
    var rt = t.rim.rim_tier||'N/A';
    var tc = rt.indexOf('Dominant')>=0?'tb-e':(rt.indexOf('Heavy')>=0?'tb-a':'tb-m');
    h += '<div class="card"><div class="card-h"><span class="card-t" style="color:'+t.c.p+'">'+t.name+' Rim Pressure</span></div><div class="card-bs">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:24px;font-weight:800;color:'+t.c.p+'">'+pct(t.rim.rim_fg_pct)+'</span><span class="tb '+tc+'">'+rt+'</span></div>';

  h += '<div class="g2 mb">';

}

  M.ffDiff.forEach(function(r){
    if(r.edge==='Opponent'){
      h += '<div style="padding:8px 0;border-bottom:1px solid #f0f2f5">'+tn(r.Factor,'#7C3B6D')+'<span style="float:right;font-weight:700;color:#7C3B6D">'+r.diff+'</span><br>';
      h += '<span style="font-size:12px;color:#666">Opponent holds advantage in '+r.Factor+'</span></div>';
    }
  });
  if(M.oppFF.efg_pct>M.ourFF.efg_pct) h += '<div style="padding:8px 0;border-bottom:1px solid #f0f2f5">'+tn('Shooting Efficiency','#9D6B8E')+'<br><span style="font-size:12px;color:#666">eFG% '+rnd(M.oppFF.efg_pct)+'% vs '+rnd(M.ourFF.efg_pct)+'%</span></div>';
  h += '</div></div>';

  h += '<div class="card"><div class="card-h"><span class="card-t" style="color:#4A7C59">&#128994; '+M.our+' Edges</span></div><div class="card-b">';
  M.ffDiff.forEach(function(r){
    if(r.edge==='Our Team'){
      h += '<div style="padding:8px 0;border-bottom:1px solid #f0f2f5">'+tn(r.Factor,'#4A7C59')+'<span style="float:right;font-weight:700;color:#4A7C59">+'+Math.abs(r.diff)+'</span><br>';
      h += '<span style="font-size:12px;color:#666">We hold advantage in '+r.Factor+'</span></div>';
    }
  });
  if(M.ourFF.ft_rate>M.oppFF.ft_rate) h += '<div style="padding:8px 0;border-bottom:1px solid #f0f2f5">'+tn('Free Throw Generation','#7FA67E')+'<br><span style="font-size:12px;color:#666">FT Rate '+rnd(M.ourFF.ft_rate)+' vs '+rnd(M.oppFF.ft_rate)+'</span></div>';
  h += '</div></div></div>';

  // Verdict
  h += '<div class="verdict mb" style="background:'+M.oc.p+'">';
  h += '<div class="verdict-t" style="color:'+M.oc.a+'">&#128203; GAME PLAN</div>';
  var bullets = [];
  M.ffDiff.forEach(function(r){
    if(r.Factor==='eFG%'&&r.edge==='Opponent') bullets.push('&#128992; Contest every shot &mdash; '+M.opp+' eFG% advantage of '+Math.abs(r.diff)+' pts');
    if(r.Factor==='OREB%'&&r.edge==='Our Team') bullets.push('&#128994; Crash the boards &mdash; OREB% edge of +'+Math.abs(r.diff)+' creates second chances');
    if(r.Factor==='FT Rate'&&r.edge==='Our Team') bullets.push('&#128994; Attack the rim &mdash; FT Rate advantage of +'+Math.abs(r.diff));
    if(r.Factor==='TOV%'&&r.edge==='Opponent') bullets.push('&#9888; Protect the ball &mdash; turnover vulnerability (TOV% '+rnd(M.ourFF.tov_pct)+'% vs '+rnd(M.oppFF.tov_pct)+'%)');
  });
  if(Math.abs((M.ourFF.pace||0)-(M.oppFF.pace||0))>2) {
    if(M.ourFF.pace>M.oppFF.pace) bullets.push('&#9889; Push the pace &mdash; '+M.our+' prefers '+rnd(M.ourFF.pace)+' poss/40 vs '+M.opp+'\'s '+rnd(M.oppFF.pace));
    else bullets.push('&#9201; Control tempo &mdash; '+M.opp+' plays at '+rnd(M.oppFF.pace)+' poss/40');
  }
  if((M.oppRim.rim_fg_pct||0)>60) bullets.push('&#128737; Protect the paint &mdash; '+M.opp+' shoots '+rnd(M.oppRim.rim_fg_pct)+'% at the rim');
  if(!bullets.length) bullets = ['&#128994; Exploit free throw generation','&#128992; Limit opponent shooting efficiency','&#9889; Control pace and tempo'];
  bullets.forEach(function(b){ h += '<div class="verdict-b">'+b+'</div>'; });
  h += '</div>';
  document.getElementById('coaching').innerHTML = h;
}

      },
      scales:{x:{grid:{display:false}},y:{grid:{color:'#f0f2f5'},title:{display:true,text:'Net Rating',font:{size:11}}}}

// UPDATE MATCHUP
// ═════════════════════════════════════════════════════════════════════════════
function updateMatchup() {
  var ourSel = document.getElementById('sel-our').value;
  var oppSel = document.getElementById('sel-opp').value;
  destroyAll();
  M = computeMatchup(ourSel, oppSel);
  renderAll();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sel-our').value = DEFAULT_OUR;
  document.getElementById('sel-opp').value = DEFAULT_OPP;
  updateMatchup();
});
